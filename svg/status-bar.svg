<svg width="900" height="40" viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Share Tech Mono', monospace; fill: #e2e8f0; font-size: 11px; }
      .bg { animation: bgC 100s 0s steps(1) infinite; }
      @keyframes bgC {
        0% { fill: #020818; } 25% { fill: #0d0418; } 50% { fill: #120a00; } 75% { fill: #001412; }
      }
      .accent { fill: #00d4ff; animation: accentC 100s 0s steps(1) infinite; }
      @keyframes accentC {
        0% { fill: #00d4ff; } 25% { fill: #cc44ff; } 50% { fill: #ffaa00; } 75% { fill: #00ffcc; }
      }
      .pulse-dot { animation: pulse 2s infinite alternate; }
      @keyframes pulse { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
  </defs>

  <rect width="900" height="40" rx="6" class="bg"/>
  <rect width="900" height="40" rx="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Pulse Status -->
  <g transform="translate(25, 20)">
    <circle r="4" class="accent pulse-dot" />
    <text x="15" y="4" letter-spacing="1">SYSTEM_ONLINE</text>
  </g>

  <!-- Metrics -->
  <g transform="translate(200, 24)">
    <text x="0">CPU: 42%</text>
    <rect x="55" y="-8" width="100" height="4" rx="2" fill="#1a2a3a"/>
    <rect x="55" y="-8" width="42" height="4" rx="2" class="accent"/>
  </g>

  <g transform="translate(380, 24)">
    <text x="0">MEM: 8.4GB</text>
    <rect x="70" y="-8" width="100" height="4" rx="2" fill="#1a2a3a"/>
    <rect x="70" y="-8" width="84" height="4" rx="2" class="accent"/>
  </g>

  <!-- Clock/Time -->
  <g transform="translate(620, 24)">
    <!-- Zap icon for Power/Signal -->
    <g transform="translate(-25, -12) scale(0.6)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
    </g>
    <text x="0">SIGNAL_STRENGTH: 100%</text>
  </g>

  <g transform="translate(800, 24)" text-anchor="end">
    <text x="75">UTC: 23:42:01</text>
  </g>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1" fill="rgba(255,255,255,0.05)">
    <animate attributeName="y" from="0" to="40" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
