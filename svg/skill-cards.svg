<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Share Tech Mono', monospace; }
      .bg { animation: bgC 100s 0s steps(1) infinite; }
      @keyframes bgC {
        0% { fill: #020818; } 25% { fill: #0d0418; } 50% { fill: #120a00; } 75% { fill: #001412; }
      }
      .accent { fill: #00d4ff; animation: accentC 100s 0s steps(1) infinite; }
      @keyframes accentC {
        0% { fill: #00d4ff; } 25% { fill: #cc44ff; } 50% { fill: #ffaa00; } 75% { fill: #00ffcc; }
      }
      .card-bg { fill: #040d1e; stroke: #1a2a3a; }
      .card-text { fill: #e2e8f0; font-size: 14px; font-weight: 600; text-anchor: middle; }
      
      .stagger-1 { animation: float 3s ease-in-out infinite both; }
      .stagger-2 { animation: float 3s 0.6s ease-in-out infinite both; }
      .stagger-3 { animation: float 3s 1.2s ease-in-out infinite both; }
      .stagger-4 { animation: float 3s 1.8s ease-in-out infinite both; }
      .stagger-5 { animation: float 3s 2.4s ease-in-out infinite both; }
      
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
  </defs>

  <rect width="900" height="200" rx="10" class="bg"/>

  <!-- Skill Card 1: Core (React/Node) -->
  <g transform="translate(90, 100)" class="stagger-1">
    <rect x="-70" y="-80" width="140" height="160" rx="8" class="card-bg"/>
    <g transform="translate(-20, -60) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <circle cx="12" cy="12" r="1"/><path d="M10.3 8.2a4.3 4.3 0 1 1 3.4 7.6 4.3 4.3 0 1 1-3.4-7.6Z"/><path d="M2.7 18.5a4.3 4.3 0 1 1 7.2-2.5 4.3 4.3 0 1 1-7.2 2.5Z"/><path d="M14.1 6.3a4.3 4.3 0 1 1 7.2 2.5 4.3 4.3 0 1 1-7.2-2.5Z" />
    </g>
    <text y="40" class="card-text">CORE</text>
    <text y="60" fill="#4da6ff" font-size="10">React / Next.js</text>
  </g>

  <!-- Skill Card 2: Logic (TS) -->
  <g transform="translate(270, 100)" class="stagger-2">
    <rect x="-70" y="-80" width="140" height="160" rx="8" class="card-bg"/>
    <g transform="translate(-20, -60) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <path d="M2.7 10.3a2.41 2.41 0 0 0 0 3.41l6.59 6.59a2.41 2.41 0 0 0 3.41 0l6.59-6.59a2.41 2.41 0 0 0 0-3.41l-6.59-6.59a2.41 2.41 0 0 0-3.41 0Z" />
    </g>
    <text y="40" class="card-text">LOGIC</text>
    <text y="60" fill="#4da6ff" font-size="10">TypeScript / Rust</text>
  </g>

  <!-- Skill Card 3: Intel (AI) -->
  <g transform="translate(450, 100)" class="stagger-3">
    <rect x="-70" y="-80" width="140" height="160" rx="8" class="card-bg"/>
    <g transform="translate(-20, -60) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 16h.01M16 16h.01M6 11V7a3 3 0 0 1 6 0v4" />
    </g>
    <text y="40" class="card-text">INTEL</text>
    <text y="60" fill="#4da6ff" font-size="10">LangChain / PyTorch</text>
  </g>

  <!-- Skill Card 4: Design -->
  <g transform="translate(630, 100)" class="stagger-4">
    <rect x="-70" y="-80" width="140" height="160" rx="8" class="card-bg"/>
    <g transform="translate(-20, -60) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <circle cx="13.5" cy="7.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.7 1.6-1.6 0-.4-.2-.8-.5-1.1-.3-.3-.5-.7-.5-1.1 0-.9.7-1.6 1.6-1.6H17c2.8 0 5-2.2 5-5 0-5.2-4.5-9.5-10-9.5Z" />
    </g>
    <text y="40" class="card-text">DESIGN</text>
    <text y="60" fill="#4da6ff" font-size="10">Figma / CSS Art</text>
  </g>

  <!-- Skill Card 5: Ops -->
  <g transform="translate(810, 100)" class="stagger-5">
    <rect x="-70" y="-80" width="140" height="160" rx="8" class="card-bg"/>
    <g transform="translate(-20, -60) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.71-2.13.09-2.91a2.18 2.18 0 0 0-3.09-.09Z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"/><path d="M9 12H4s.5 5 2 5c1.17 0 2.26-.58 3-1.5M15 9V4s-5 .5-5 2c0 1.17.58 2.26 1.5 3" />
    </g>
    <text y="40" class="card-text">OPS</text>
    <text y="60" fill="#4da6ff" font-size="10">Docker / Vercel</text>
  </g>

</svg>
