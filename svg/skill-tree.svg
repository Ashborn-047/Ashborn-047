<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Share Tech Mono', monospace; }
      .header-text { font-family: 'Orbitron', sans-serif; }

      .bg { animation: bgC 100s 59s steps(1) infinite; }
      @keyframes bgC {
        0% { fill: #020818; } 25% { fill: #0d0418; } 50% { fill: #120a00; } 75% { fill: #001412; }
      }
      .accent { fill: #00d4ff; animation: accentC 100s 59s steps(1) infinite; }
      @keyframes accentC {
        0% { fill: #00d4ff; } 25% { fill: #cc44ff; } 50% { fill: #ffaa00; } 75% { fill: #00ffcc; }
      }
      .accent-stroke { stroke: #00d4ff; animation: accentSC 100s 59s steps(1) infinite; }
      @keyframes accentSC {
        0% { stroke: #00d4ff; } 25% { stroke: #cc44ff; } 50% { stroke: #ffaa00; } 75% { stroke: #00ffcc; }
      }

      .node { fill: #040f20; stroke-width: 1.5; }
      .node-text { font-size: 10px; fill: #e2e8f0; text-anchor: middle; }
      .connection { stroke-width: 1; opacity: 0.2; }
      
      .active-pulse { animation: pulse 2s infinite alternate; }
      @keyframes pulse { from { opacity: 0.2; } to { opacity: 0.8; } }

      .branch-glow { filter: drop-shadow(0 0 6px currentColor); }
    </style>
  </defs>

  <!-- BG -->
  <rect width="900" height="400" rx="10" class="bg"/>

  <!-- Header -->
  <g transform="translate(30,35)">
    <!-- Crystal Ball for 🔮 -->
    <g transform="translate(0, -18) scale(0.9)" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="accent">
       <circle cx="12" cy="10" r="8"/><path d="M5.8 17.5A12.6 12.6 0 0 1 12 16a12.6 12.6 0 0 1 6.2 1.5M3 21h18M7 21l-1-4M17 21l1-4" />
    </g>
    <text x="35" y="0" font-size="20" font-weight="700" letter-spacing="3" class="header-text accent">SKILL TREE EVOLUTION</text>
  </g>

  <!-- Connections -->
  <g class="accent-stroke connection">
    <!-- Root to branches -->
    <path d="M450 200 L250 100" />
    <path d="M450 200 L650 100" />
    <path d="M450 200 L450 320" />
    <!-- Sub branches -->
    <path d="M250 100 L150 50" /><path d="M250 100 L150 150" />
    <path d="M650 100 L750 50" /><path d="M650 100 L750 150" />
    <path d="M450 320 L350 370" /><path d="M450 320 L550 370" />
  </g>

  <!-- Root Node -->
  <g transform="translate(450, 200)">
    <circle r="40" class="node accent-stroke" />
    <text y="5" class="node-text" font-size="12" font-weight="700">CORE ARCH</text>
  </g>

  <!-- Branch 1: Frontend (Left) -->
  <g transform="translate(250, 100)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" class="node accent-stroke" />
    <text y="5" class="node-text">FRONTEND</text>
    <!-- Icon: Palette (Design) -->
    <g transform="translate(-70, -10) scale(0.6)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <circle cx="13.5" cy="7.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.7 1.6-1.6 0-.4-.2-.8-.5-1.1-.3-.3-.5-.7-.5-1.1 0-.9.7-1.6 1.6-1.6H17c2.8 0 5-2.2 5-5 0-5.2-4.5-9.5-10-9.5Z" />
    </g>
  </g>

  <!-- Branch 2: Intelligence (Right) -->
  <g transform="translate(650, 100)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" class="node accent-stroke" />
    <text y="5" class="node-text">INTELLIGENCE</text>
    <!-- Icon: Robot -->
    <g transform="translate(60, -10) scale(0.6)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 16h.01M16 16h.01M6 11V7a3 3 0 0 1 6 0v4" />
    </g>
  </g>

  <!-- Branch 3: Growth (Bottom) -->
  <g transform="translate(450, 320)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" class="node accent-stroke" />
    <text y="5" class="node-text">DEVELOPMENT</text>
    <!-- Icon: Zap -->
    <g transform="translate(-10, 25) scale(0.6)" fill="none" stroke="currentColor" stroke-width="2" class="accent">
       <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
    </g>
  </g>

  <!-- Leaves (Nodes) -->
  <g class="accent" opacity="0.6">
    <circle cx="150" cy="50"  r="5" /><text x="150" y="70" class="node-text">React</text>
    <circle cx="150" cy="150" r="5" /><text x="150" y="170" class="node-text">Three.js</text>
    <circle cx="750" cy="50"  r="5" /><text x="750" y="70" class="node-text">PyTorch</text>
    <circle cx="750" cy="150" r="5" /><text x="750" y="170" class="node-text">NLP</text>
    <circle cx="350" cy="370" r="5" /><text x="350" y="390" class="node-text">Rust</text>
    <circle cx="550" cy="370" r="5" /><text x="550" y="390" class="node-text">Go</text>
  </g>

</svg>
