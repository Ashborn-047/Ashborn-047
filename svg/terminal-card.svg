<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Share Tech Mono', monospace; }
      .bg { animation: bgC 100s 0s steps(1) infinite; }
      @keyframes bgC {
        0% { fill: #020818; } 25% { fill: #0d0418; } 50% { fill: #120a00; } 75% { fill: #001412; }
      }
      .card-bg { fill: #040d1e; stroke: #1a2a3a; }
      .accent { fill: #00d4ff; animation: accentC 100s 0s steps(1) infinite; }
      @keyframes accentC {
        0% { fill: #00d4ff; } 25% { fill: #cc44ff; } 50% { fill: #ffaa00; } 75% { fill: #00ffcc; }
      }
      .accent-stroke { stroke: #00d4ff; animation: accentSC 100s 0s steps(1) infinite; }
      @keyframes accentSC {
        0% { stroke: #00d4ff; } 25% { stroke: #cc44ff; } 50% { stroke: #ffaa00; } 75% { stroke: #00ffcc; }
      }

      .title { font-family: 'Orbitron', sans-serif; fill: #e2e8f0; font-size: 12px; letter-spacing: 2px; }
      .terminal-text { fill: #e2e8f0; font-size: 13px; }
      .kw { fill: #4da6ff; animation: kwC 100s 0s steps(1) infinite; }
      @keyframes kwC {
        0% { fill: #4da6ff; } 25% { fill: #cc88ff; } 50% { fill: #ffaa00; } 75% { fill: #00ffcc; }
      }
      
      .blink { animation: bA 1.2s step-end infinite; }
      @keyframes bA { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
  </defs>

  <rect width="700" height="400" rx="12" class="bg"/>
  
  <!-- Terminal Frame -->
  <rect x="25" y="25" width="650" height="350" rx="8" class="card-bg" stroke-width="1.5"/>
  
  <!-- Title Bar -->
  <path d="M25 33 a8 8 0 0 1 8 -8 h634 a8 8 0 0 1 8 8 v25 h-650 z" fill="#0a1a2a"/>
  <circle cx="45" cy="40" r="5" fill="#ff5f56"/>
  <circle cx="65" cy="40" r="5" fill="#ffbd2e"/>
  <circle cx="85" cy="40" r="5" fill="#27c93f"/>
  <text x="350" y="44" text-anchor="middle" class="title">SESSION: INFRA_CORE</text>

  <!-- Terminal Content -->
  <g transform="translate(45, 90)" class="terminal-text">
    <text y="0"><tspan class="kw">$&gt; </tspan>fetch user_meta --identity="Ashborn"</text>
    <text y="25" opacity="0.6">Fetching remote data from sector_047...</text>
    
    <g transform="translate(0, 50)">
      <text y="0"><tspan class="kw">NAME:     </tspan>Pushan Maurya</text>
      <text y="25"><tspan class="kw">ROLE:     </tspan>Architect / Orchestrator</text>
      <text y="50"><tspan class="kw">LOCATION: </tspan>Digital Void (GMT+5:30)</text>
      <text y="75"><tspan class="kw">STATUS:   </tspan>Optimizing Reality</text>
    </g>

    <text y="155" class="kw">$&gt; initialize --mode="Creation"</text>
    <text y="180">Booting neural-subsystems... [ OK ]</text>
    <text y="205">Injecting creative-fluid...   [ OK ]</text>
    
    <text y="235"><tspan class="kw">$&gt; </tspan>await next_innovation()<tspan class="blink accent"> █</tspan></text>
  </g>

  <!-- Frame Glow -->
  <rect x="2" y="2" width="696" height="396" rx="14" fill="none" class="accent-stroke" stroke-width="2" opacity="0.4"/>
</svg>
