<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Fallback font stack - Github blocks external @imports */
      .top-label, .sub-text, .status-text, .cursor-line, .rain {
        font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
      }
      .glow-text {
        font-family: 'Orbitron', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }

      /*
       * THEME ENGINE — 4 themes × 30s = 120s total loop
       * steps(1) creates instant hard switches (no cross-fade)
       * Each animated property cycles through all 4 theme values
       */

      /* ── BACKGROUND COLORS ── */
      .bg-rect {
        animation: bgCycle 120s steps(1) infinite;
      }
      @keyframes bgCycle {
        0%  { fill: #020818; } /* Blue  */
        25% { fill: #0d0418; } /* Purple */
        50% { fill: #120a00; } /* Amber */
        75% { fill: #001412; } /* Teal */
      }

      /* ── GRID LINES ── */
      .grid-h, .grid-v {
        animation: gridCycle 120s steps(1) infinite;
      }
      @keyframes gridCycle {
        0%  { stroke: #0a2040; } /* Blue  */
        25% { stroke: #2a0a40; } /* Purple */
        50% { stroke: #2a1500; } /* Amber */
        75% { stroke: #003830; } /* Teal */
      }

      /* ── OUTER BORDER ── */
      .outer-border {
        animation: borderCycle 120s steps(1) infinite, borderPulse 2.5s ease-in-out infinite alternate;
      }
      @keyframes borderCycle {
        0%  { stroke: #0d3a6e; } /* Blue  */
        25% { stroke: #4a1570; } /* Purple */
        50% { stroke: #5a3000; } /* Amber */
        75% { stroke: #005540; } /* Teal */
      }

      /* ── CORNER BRACKET COLOR ── */
      .corner-bracket {
        animation: accentCycle 120s steps(1) infinite, borderPulse 2.5s ease-in-out infinite alternate;
      }

      /* ── ACCENT / GLOW COLOR ── */
      @keyframes accentCycle {
        0%  { stroke: #00d4ff; } /* Blue  */
        25% { stroke: #cc44ff; } /* Purple */
        50% { stroke: #ffaa00; } /* Amber */
        75% { stroke: #00ffcc; } /* Teal */
      }

      /* ── CORNER PING DOTS ── */
      .c-ping-1 { animation: accentFill 120s steps(1) infinite, ping 2.0s ease-out infinite 0.0s; }
      .c-ping-2 { animation: accentFill 120s steps(1) infinite, ping 2.0s ease-out infinite 0.5s; }
      .c-ping-3 { animation: accentFill 120s steps(1) infinite, ping 2.0s ease-out infinite 1.0s; }
      .c-ping-4 { animation: accentFill 120s steps(1) infinite, ping 2.0s ease-out infinite 1.5s; }
      @keyframes accentFill {
        0%  { fill: #00d4ff; }
        25% { fill: #cc44ff; }
        50% { fill: #ffaa00; }
        75% { fill: #00ffcc; }
      }
      @keyframes ping {
        0%   { r: 3;  opacity: 1; }
        100% { r: 12; opacity: 0; }
      }

      /* ── SCANLINE ── */
      .scanline {
        animation: scanCycle 120s steps(1) infinite, scan 6s linear infinite;
      }
      @keyframes scanCycle {
        0%  { fill: #00d4ff; }
        25% { fill: #cc44ff; }
        50% { fill: #ffaa00; }
        75% { fill: #00ffcc; }
      }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0.04; }
        50%  { opacity: 0.07; }
        100% { transform: translateY(290px); opacity: 0.04; }
      }

      /* ── MATRIX RAIN ── */
      .rain {
        animation: rainCycle 120s steps(1) infinite, fall linear infinite;
        opacity: 0;
      }
      @keyframes rainCycle {
        0%  { fill: #00ff88; }  /* Blue theme  — green rain */
        25% { fill: #ff44ff; }  /* Purple theme — magenta rain */
        50% { fill: #ff8800; }  /* Amber theme  — orange rain */
        75% { fill: #00ffaa; }  /* Teal theme   — aqua rain */
      }
      @keyframes fall {
        0%   { opacity: 0;    transform: translateY(-30px); }
        10%  { opacity: 0.65; }
        90%  { opacity: 0.35; }
        100% { opacity: 0;    transform: translateY(290px); }
      }
      .r1  { animation-duration: 1s, 2.1s; animation-delay: 0s,  0.0s; }
      .r2  { animation-duration: 1s, 1.8s; animation-delay: 0s,  0.3s; }
      .r3  { animation-duration: 1s, 2.4s; animation-delay: 0s,  0.6s; }
      .r4  { animation-duration: 1s, 1.6s; animation-delay: 0s,  1.1s; }
      .r5  { animation-duration: 1s, 2.0s; animation-delay: 0s,  0.9s; }
      .r6  { animation-duration: 1s, 2.7s; animation-delay: 0s,  0.2s; }
      .r7  { animation-duration: 1s, 1.9s; animation-delay: 0s,  1.4s; }
      .r8  { animation-duration: 1s, 2.3s; animation-delay: 0s,  0.7s; }
      .r9  { animation-duration: 1s, 1.7s; animation-delay: 0s,  1.8s; }
      .r10 { animation-duration: 1s, 2.5s; animation-delay: 0s,  0.4s; }
      .r11 { animation-duration: 1s, 2.2s; animation-delay: 0s,  1.2s; }
      .r12 { animation-duration: 1s, 1.5s; animation-delay: 0s,  2.0s; }
      .r13 { animation-duration: 1s, 2.8s; animation-delay: 0s,  0.1s; }
      .r14 { animation-duration: 1s, 2.0s; animation-delay: 0s,  1.6s; }
      .r15 { animation-duration: 1s, 1.8s; animation-delay: 0s,  2.3s; }
      .r16 { animation-duration: 1s, 2.6s; animation-delay: 0s,  0.5s; }
      .r17 { animation-duration: 1s, 1.4s; animation-delay: 0s,  2.1s; }
      .r18 { animation-duration: 1s, 2.9s; animation-delay: 0s,  0.8s; }

      /* ── TOP LABEL ── */
      .top-label {
        animation: topLabelCycle 120s steps(1) infinite, topLabelFade 4s ease-in-out infinite alternate;
      }
      @keyframes topLabelCycle {
        0%  { fill: #00d4ff; }
        25% { fill: #cc44ff; }
        50% { fill: #ffaa00; }
        75% { fill: #00ffcc; }
      }
      @keyframes topLabelFade {
        from { opacity: 0.5; }
        to   { opacity: 0.9; }
      }

      /* ── TOP LABEL TEXT — changes per theme ── */
      .label-blue   { animation: showBlue   120s steps(1) infinite; }
      .label-purple { animation: showPurple 120s steps(1) infinite; }
      .label-amber  { animation: showAmber  120s steps(1) infinite; }
      .label-teal   { animation: showTeal   120s steps(1) infinite; }

      @keyframes showBlue   { 0%  { opacity:1; } 25%,100% { opacity:0; } }
      @keyframes showPurple { 25% { opacity:1; } 0%,50%   { opacity:0; } 50%,100% { opacity:0; } }
      @keyframes showAmber  { 50% { opacity:1; } 0%,25%   { opacity:0; } 75%,100% { opacity:0; } }
      @keyframes showTeal   { 75% { opacity:1; } 0%,50%   { opacity:0; } 100%     { opacity:0; } }

      /* ── TITLE GRADIENT — animated via stop-color ── */
      .stop-a {
        animation: stopACycle 120s steps(1) infinite;
      }
      .stop-b {
        animation: stopBCycle 120s steps(1) infinite;
      }
      .stop-c {
        animation: stopCCycle 120s steps(1) infinite;
      }
      @keyframes stopACycle {
        0%  { stop-color: #00d4ff; } /* Blue  */
        25% { stop-color: #cc44ff; } /* Purple */
        50% { stop-color: #ffcc00; } /* Amber */
        75% { stop-color: #00ffcc; } /* Teal */
      }
      @keyframes stopBCycle {
        0%  { stop-color: #4da6ff; }
        25% { stop-color: #ff88ff; }
        50% { stop-color: #ffaa00; }
        75% { stop-color: #44ddbb; }
      }
      @keyframes stopCCycle {
        0%  { stop-color: #0066ff; }
        25% { stop-color: #8800cc; }
        50% { stop-color: #cc6600; }
        75% { stop-color: #007799; }
      }

      /* ── TITLE GLOW ── */
      .glow-text {
        animation: titleGlowCycle 120s steps(1) infinite, titleGlowPulse 3s ease-in-out infinite alternate;
      }
      @keyframes titleGlowCycle {
        0%  { filter: drop-shadow(0 0 8px #00d4ff) drop-shadow(0 0 20px #0066ff88); }
        25% { filter: drop-shadow(0 0 8px #cc44ff) drop-shadow(0 0 20px #88008888); }
        50% { filter: drop-shadow(0 0 8px #ffaa00) drop-shadow(0 0 20px #cc660088); }
        75% { filter: drop-shadow(0 0 8px #00ffcc) drop-shadow(0 0 20px #00997788); }
      }
      @keyframes titleGlowPulse {
        from { opacity: 0.88; }
        to   { opacity: 1.00; }
      }

      /* ── SUBTITLE ── */
      .sub-text {
        animation: subCycle 120s steps(1) infinite, subfade 4s ease-in-out infinite alternate;
      }
      @keyframes subCycle {
        0%  { fill: #4da6ff; }
        25% { fill: #ff88ff; }
        50% { fill: #ffbb44; }
        75% { fill: #44ddbb; }
      }
      @keyframes subfade {
        from { opacity: 0.65; }
        to   { opacity: 1.00; }
      }

      /* ── STATUS TEXT ── */
      .status-text {
        animation: statusCycle 120s steps(1) infinite;
      }
      @keyframes statusCycle {
        0%  { fill: #00ff88; }
        25% { fill: #ff66ff; }
        50% { fill: #ffcc44; }
        75% { fill: #00ffaa; }
      }

      /* ── CURSOR ── */
      .cursor-line {
        animation: cursorCycle 120s steps(1) infinite;
      }
      @keyframes cursorCycle {
        0%  { fill: #00d4ff; }
        25% { fill: #cc44ff; }
        50% { fill: #ffaa00; }
        75% { fill: #00ffcc; }
      }
      .blink {
        animation: blink 1.2s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* ── HEX DECORATORS ── */
      .hex-1 {
        animation: hexCycle1 120s steps(1) infinite, hexspin1 20s linear infinite;
        transform-origin: 820px 50px;
      }
      .hex-2 {
        animation: hexCycle2 120s steps(1) infinite, hexspin2 14s linear infinite reverse;
        transform-origin: 80px 230px;
      }
      @keyframes hexCycle1 {
        0%  { stroke: #0044aa; }
        25% { stroke: #660099; }
        50% { stroke: #885500; }
        75% { stroke: #006655; }
      }
      @keyframes hexCycle2 {
        0%  { stroke: #0033aa; }
        25% { stroke: #550088; }
        50% { stroke: #774400; }
        75% { stroke: #005544; }
      }
      @keyframes hexspin1 { to { transform: rotate(360deg);  } }
      @keyframes hexspin2 { to { transform: rotate(-360deg); } }

      /* ── LINE GRADIENT STOPS ── */
      .line-stop-a {
        animation: lineStopA 120s steps(1) infinite;
      }
      .line-stop-b {
        animation: lineStopB 120s steps(1) infinite;
      }
      @keyframes lineStopA {
        0%  { stop-color: #00d4ff; }
        25% { stop-color: #cc44ff; }
        50% { stop-color: #ffaa00; }
        75% { stop-color: #00ffcc; }
      }
      @keyframes lineStopB {
        0%  { stop-color: #0066ff; }
        25% { stop-color: #8800cc; }
        50% { stop-color: #cc6600; }
        75% { stop-color: #007799; }
      }

      /* ── THEME BADGE ── */
      .theme-badge-bg {
        animation: badgeBgCycle 120s steps(1) infinite;
      }
      @keyframes badgeBgCycle {
        0%  { fill: #001830; }
        25% { fill: #1a0030; }
        50% { fill: #1e1000; }
        75% { fill: #002820; }
      }
      .theme-badge-border {
        animation: accentCycle 120s steps(1) infinite;
        stroke-width: 0.8;
      }

      /* shared */
      @keyframes borderPulse {
        from { stroke-opacity: 0.35; }
        to   { stroke-opacity: 1.00; }
      }
    </style>

    <!-- Title gradient — stops are animated -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   class="stop-a"/>
      <stop offset="50%"  class="stop-b"/>
      <stop offset="100%" class="stop-c"/>
    </linearGradient>

    <!-- Divider line gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   class="line-stop-a" stop-opacity="0"/>
      <stop offset="30%"  class="line-stop-a" stop-opacity="0.8"/>
      <stop offset="70%"  class="line-stop-b" stop-opacity="0.8"/>
      <stop offset="100%" class="line-stop-b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="900" height="280" rx="12" class="bg-rect"/>

  <!-- ── GRID ── -->
  <g stroke-width="0.5" opacity="0.6" class="grid-h">
    <line x1="0" y1="40"  x2="900" y2="40"/>
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
  </g>
  <g stroke-width="0.5" opacity="0.6" class="grid-v">
    <line x1="90"  y1="0" x2="90"  y2="280"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="270" y1="0" x2="270" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="630" y1="0" x2="630" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="810" y1="0" x2="810" y2="280"/>
  </g>

  <!-- ── SCANLINE ── -->
  <rect class="scanline" x="0" y="0" width="900" height="3" rx="1"/>

  <!-- ── MATRIX RAIN ── -->
  <g font-family="'Share Tech Mono', monospace" font-size="11" opacity="0.22">
    <text class="rain r1"  x="25"  y="0">1</text>
    <text class="rain r2"  x="58"  y="0">0</text>
    <text class="rain r3"  x="92"  y="0">1</text>
    <text class="rain r4"  x="128" y="0">0</text>
    <text class="rain r5"  x="162" y="0">1</text>
    <text class="rain r6"  x="195" y="0">0</text>
    <text class="rain r7"  x="228" y="0">A</text>
    <text class="rain r8"  x="670" y="0">0</text>
    <text class="rain r9"  x="700" y="0">1</text>
    <text class="rain r10" x="735" y="0">0</text>
    <text class="rain r11" x="768" y="0">B</text>
    <text class="rain r12" x="802" y="0">0</text>
    <text class="rain r13" x="836" y="0">1</text>
    <text class="rain r14" x="868" y="0">0</text>
    <text class="rain r15" x="42"  y="0">C</text>
    <text class="rain r16" x="110" y="0">1</text>
    <text class="rain r17" x="750" y="0">D</text>
    <text class="rain r18" x="815" y="0">1</text>
  </g>

  <!-- ── HEXAGON DECORATORS ── -->
  <g class="hex-1" fill="none" stroke-width="1" opacity="0.4">
    <polygon points="820,20 840,32 840,56 820,68 800,56 800,32"/>
    <polygon points="820,30 835,39 835,57 820,66 805,57 805,39" stroke-width="0.5"/>
  </g>
  <g class="hex-2" fill="none" stroke-width="1" opacity="0.3">
    <polygon points="80,205 100,217 100,241 80,253 60,241 60,217"/>
  </g>

  <!-- ── CORNER BRACKETS ── -->
  <g fill="none" stroke-width="1.2" class="corner-bracket">
    <line x1="12" y1="12" x2="40" y2="12"/>
    <line x1="12" y1="12" x2="12" y2="40"/>
    <line x1="888" y1="12" x2="860" y2="12"/>
    <line x1="888" y1="12" x2="888" y2="40"/>
    <line x1="12" y1="268" x2="40" y2="268"/>
    <line x1="12" y1="268" x2="12" y2="240"/>
    <line x1="888" y1="268" x2="860" y2="268"/>
    <line x1="888" y1="268" x2="888" y2="240"/>
  </g>

  <!-- ── CORNER PINGS ── -->
  <circle cx="12"  cy="12"  r="3" class="c-ping-1"/>
  <circle cx="888" cy="12"  r="3" class="c-ping-2"/>
  <circle cx="12"  cy="268" r="3" class="c-ping-3"/>
  <circle cx="888" cy="268" r="3" class="c-ping-4"/>

  <!-- ── THEME BADGE (top-right) ── -->
  <rect x="750" y="16" width="132" height="18" rx="4" class="theme-badge-bg"/>
  <rect x="750" y="16" width="132" height="18" rx="4" fill="none" class="theme-badge-border"/>
  <!-- Per-theme badge labels (only one visible at a time) -->
  <text x="816" y="29" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" letter-spacing="1" class="label-blue"   fill="#00d4ff">◈ MIDNIGHT BLUE</text>
  <text x="816" y="29" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" letter-spacing="1" class="label-purple" fill="#cc44ff">◈ NEON PURPLE</text>
  <text x="816" y="29" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" letter-spacing="1" class="label-amber"  fill="#ffaa00">◈ AMBER GOLD</text>
  <text x="816" y="29" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" letter-spacing="1" class="label-teal"   fill="#00ffcc">◈ ARCTIC TEAL</text>

  <!-- ── TOP LABEL ── -->
  <text x="450" y="38" text-anchor="middle"
        font-family="'Share Tech Mono', monospace"
        font-size="10" letter-spacing="6"
        class="top-label">
    // ARCHITECT SYSTEM ONLINE //
  </text>

  <!-- ── MAIN TITLE ── -->
  <text x="450" y="132" text-anchor="middle"
        font-family="'Orbitron', 'Share Tech Mono', monospace"
        font-size="70" font-weight="900"
        letter-spacing="8"
        fill="url(#titleGrad)"
        class="glow-text">ASHBORN</text>

  <!-- ── DIVIDER ── -->
  <rect x="150" y="149" width="600" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- ── SUBTITLE ── -->
  <text x="450" y="180" text-anchor="middle"
        font-family="'Share Tech Mono', monospace"
        font-size="14" letter-spacing="4"
        class="sub-text">
    FRONTEND ARCHITECT  ·  AI ORCHESTRATOR
  </text>

  <!-- ── STATUS LINE ── -->
  <text x="450" y="218" text-anchor="middle"
        font-family="'Share Tech Mono', monospace"
        font-size="11" letter-spacing="2" opacity="0.75"
        class="status-text">
    [ STATUS: ONLINE ]  [ STACK: LEGENDARY ]  [ AGENTS: DEPLOYED ]
  </text>

  <!-- ── CURSOR LINE ── -->
  <text x="450" y="249" text-anchor="middle"
        font-family="'Share Tech Mono', monospace"
        font-size="13" opacity="0.85"
        class="cursor-line">
    $&gt; building the future_<tspan class="blink">█</tspan>
  </text>

  <!-- ── BINARY FOOTER ── -->
  <text x="450" y="268" text-anchor="middle"
        font-family="'Share Tech Mono', monospace"
        font-size="8" letter-spacing="3"
        fill="#0a2040" opacity="0.7">
    01000001 01010011 01001000 01000010 01001111 01010010 01001110
  </text>

  <!-- ── OUTER FRAME ── -->
  <rect x="2" y="2" width="896" height="276" rx="11"
        fill="none" stroke-width="1.5"
        class="outer-border"/>
</svg>
